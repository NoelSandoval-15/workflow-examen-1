spring.application.name=backend

# MongoDB (business data)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=examensw1

# H2 (Camunda engine tables - in-memory)
spring.datasource.url=jdbc:h2:mem:camunda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false

# Camunda 7 engine
camunda.bpm.auto-deployment-enabled=false
camunda.bpm.history-level=full
camunda.bpm.job-execution.enabled=true
camunda.bpm.admin-user.id=admin
camunda.bpm.admin-user.password=admin
camunda.bpm.admin-user.first-name=Admin

# JWT
jwt.secret=clave-secreta-super-segura-examensw1-2024
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:4200,http://localhost:8100

# Server
server.port=8080
