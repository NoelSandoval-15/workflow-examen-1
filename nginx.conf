events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Habilitar compresión Gzip para mayor velocidad
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Redirigir todo el tráfico HTTP a HTTPS (Puerto 443)
    server {
        listen 80;
        server_name uagrm.xyz www.uagrm.xyz;

        # Desafío de Let's Encrypt / Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Servidor Principal con HTTPS
    server {
        listen 443 ssl;
        server_name uagrm.xyz www.uagrm.xyz;

        # Rutas a los certificados SSL generados por Let's Encrypt
        ssl_certificate /etc/nginx/certs/live/uagrm.xyz/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/uagrm.xyz/privkey.pem;

        # Ajustes de Seguridad SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Tamaño máximo de archivos para subidas (S3, OnlyOffice, etc.)
        client_max_body_size 100M;

        # 1. Servir Frontend Angular
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Redirigir API del Backend (Spring Boot)
        location /api/ {
            proxy_pass http://spring-boot:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Redirigir WebSockets del Backend (Spring Boot / STOMP)
        location /ws/ {
            proxy_pass http://spring-boot:8080/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s; # Evitar que la conexión se cierre por inactividad
        }

        # 4. Redirigir API del Microservicio de IA (FastAPI)
        location /api/ia/ {
            proxy_pass http://fastapi-ia:8000/api/ia/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 5. Redirigir OnlyOffice Document Server
        location /onlyoffice/ {
            proxy_pass http://onlyoffice:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Encabezados requeridos por OnlyOffice para proxy inverso
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
