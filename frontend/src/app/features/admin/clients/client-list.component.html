<div class="page-header">
  <h2>Clientes</h2>
  <button mat-raised-button color="primary" (click)="mostrarForm = !mostrarForm">
    <mat-icon>person_add</mat-icon> Nuevo Cliente
  </button>
</div>

@if (mostrarForm) {
  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="guardar()" class="form-grid">
        <mat-form-field appearance="outline"><mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre"></mat-form-field>
        <mat-form-field appearance="outline"><mat-label>Apellido</mat-label>
          <input matInput formControlName="apellido"></mat-form-field>
        <mat-form-field appearance="outline"><mat-label>Correo</mat-label>
          <input matInput formControlName="correo" type="email"></mat-form-field>
        <mat-form-field appearance="outline"><mat-label>Teléfono</mat-label>
          <input matInput formControlName="telefono"></mat-form-field>
        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="guardando || form.invalid">Guardar</button>
          <button mat-button type="button" (click)="mostrarForm = false">Cancelar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
}

@if (loading) {
  <div class="loading-center"><mat-spinner diameter="48"></mat-spinner></div>
} @else {
  <mat-card>
    <table mat-table [dataSource]="clientes" class="full-width">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let c">{{ c.nombre }} {{ c.apellido }}</td>
      </ng-container>
      <ng-container matColumnDef="correo">
        <th mat-header-cell *matHeaderCellDef>Correo</th>
        <td mat-cell *matCellDef="let c">{{ c.correo ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let c">{{ c.telefono ?? '—' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols;"></tr>
    </table>
  </mat-card>
}
