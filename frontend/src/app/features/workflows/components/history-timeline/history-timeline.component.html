<div class="timeline">
  @for (entry of historial; track entry.fecha) {
    <div class="timeline-item">
      <div class="timeline-icon" [style.background]="getColor(entry.accion)">
        <mat-icon>{{ getIcono(entry.accion) }}</mat-icon>
      </div>
      <div class="timeline-content">
        <div class="timeline-header">
          <span class="nodo-nombre">{{ entry.nodoNombre }}</span>
          <span class="accion-badge">{{ entry.accion }}</span>
        </div>
        @if (entry.observacion) {
          <p class="observacion">{{ entry.observacion }}</p>
        }
        <small class="fecha">{{ entry.fecha | date:'dd/MM/yyyy HH:mm' }}</small>
      </div>
    </div>
  }

  @if (historial.length === 0) {
    <p class="empty">Sin historial registrado</p>
  }
</div>
